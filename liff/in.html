<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>รับสารเข้า — Stock App</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    video.cam {
      width: 100%;
      max-height: 320px;
      background: #000;
      border-radius: 8px;
      margin-bottom: 10px;
      object-fit: cover;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .photo-slot {
      aspect-ratio: 1 / 1;
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      position: relative;
    }
    .photo-slot.filled { border-style: solid; border-color: var(--cherry); }
    .photo-slot img { width:100%; height:100%; object-fit:cover; }
    .photo-slot .label { position:absolute; top:4px; left:4px; background:rgba(0,0,0,0.5); color:white; padding:2px 6px; border-radius:4px; font-size:10px; }
    .btn-camera {
      width:100%; padding:12px; margin-bottom:12px;
      background:var(--cherry); color:white;
      border:none; border-radius:8px;
      font-size:15px; font-weight:600;
      cursor:pointer;
    }
    .btn-camera:disabled { background:var(--muted); cursor:not-allowed; }
    .btn-stop { background:var(--reject) !important; }
    .progress-info {
      background:var(--cherry-tint); padding:10px 14px;
      border-radius:6px; font-size:13px;
      margin-bottom:12px; text-align:center;
      color:var(--cherry-dark); font-weight:600;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="./img/logo.jpg" alt="logo" onerror="this.style.display='none'" />
    <div class="brand" id="brand">STOCK APP</div>
    <h1>รับสารเข้าคลัง</h1>
    <div class="subtitle">บันทึกการรับสารเข้าคลัง — บังคับถ่ายรูป 3 ใบ</div>

    <div id="error" class="error" style="display:none"></div>

    <!-- Step 1: เลือกสาร -->
    <div class="field">
      <div class="label">สาร</div>
      <select id="material" disabled>
        <option value="">กำลังโหลด...</option>
      </select>
    </div>

    <!-- Step 2: form -->
    <div class="field">
      <div class="label">เลขล็อต (Lot No.)</div>
      <input type="text" id="lot_no" placeholder="เช่น L240515-A" />
    </div>

    <div class="field">
      <div class="label">จำนวน <span id="unit-label" style="color:var(--muted);font-weight:400"></span></div>
      <input type="number" id="qty" inputmode="decimal" placeholder="0" min="0" step="0.01" />
    </div>

    <div class="field">
      <div class="label">Supplier</div>
      <input type="text" id="supplier" placeholder="ชื่อ supplier (ถ้ามี)" />
    </div>

    <div class="field">
      <div class="label">วันหมดอายุ</div>
      <input type="date" id="expire_date" />
    </div>

    <div class="field">
      <div class="label">หมายเหตุ (optional)</div>
      <input type="text" id="note" placeholder="-" />
    </div>

    <!-- Step 3: ถ่าย 3 รูป -->
    <div class="label" style="margin-top:8px">รูปยืนยัน (บังคับ 3 รูป)</div>
    <div class="progress-info" id="progress-info">ถ่ายแล้ว 0/3 รูป</div>

    <video id="cam" class="cam" autoplay playsinline style="display:none"></video>

    <button id="btn-start-cam" class="btn-camera">เปิดกล้อง</button>
    <button id="btn-capture" class="btn-camera" style="display:none">ถ่ายรูปที่ <span id="next-num">1</span></button>

    <div class="photo-grid">
      <div class="photo-slot" id="slot-1"><span class="label">รูปที่ 1</span><span>ยังไม่ถ่าย</span></div>
      <div class="photo-slot" id="slot-2"><span class="label">รูปที่ 2</span><span>ยังไม่ถ่าย</span></div>
      <div class="photo-slot" id="slot-3"><span class="label">รูปที่ 3</span><span>ยังไม่ถ่าย</span></div>
    </div>

    <button id="btn-submit" class="btn-primary" disabled>บันทึก</button>
    <button id="btn-cancel" class="btn-secondary" onclick="liff.closeWindow()">ยกเลิก</button>
  </div>

  <div class="page-footer" id="footer">Stock App</div>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="module">
    import { CONFIG } from './js/config.js';
    import { api } from './js/api.js';
    import { initAuth, state } from './js/auth.js';
    import { startCamera, captureFromVideoWithStamp, stopCamera } from './js/camera.js';
    import { showError, clearError } from './js/utils.js';

    const els = {
      brand: document.getElementById('brand'),
      footer: document.getElementById('footer'),
      err: document.getElementById('error'),
      material: document.getElementById('material'),
      unitLabel: document.getElementById('unit-label'),
      lot_no: document.getElementById('lot_no'),
      qty: document.getElementById('qty'),
      supplier: document.getElementById('supplier'),
      expire: document.getElementById('expire_date'),
      note: document.getElementById('note'),
      progress: document.getElementById('progress-info'),
      cam: document.getElementById('cam'),
      btnStart: document.getElementById('btn-start-cam'),
      btnCapture: document.getElementById('btn-capture'),
      nextNum: document.getElementById('next-num'),
      btnSubmit: document.getElementById('btn-submit'),
    };

    if (CONFIG.BRAND_NAME) {
      els.brand.textContent = CONFIG.BRAND_NAME;
      els.footer.textContent = CONFIG.BRAND_NAME;
    }

    const images = [null, null, null];
    let materials = [];
    let camStream = null;

    function updateProgress() {
      const taken = images.filter(Boolean).length;
      els.progress.textContent = `ถ่ายแล้ว ${taken}/3 รูป`;
      els.nextNum.textContent = String(taken + 1);
      updateSubmit();
    }

    function updateSubmit() {
      const taken = images.filter(Boolean).length;
      const ok = els.material.value
        && els.lot_no.value.trim()
        && parseFloat(els.qty.value) > 0
        && els.expire.value
        && taken === 3;
      els.btnSubmit.disabled = !ok;
    }

    function renderPhoto(idx, dataUrl) {
      const slot = document.getElementById('slot-' + (idx + 1));
      slot.innerHTML = `<span class="label">รูปที่ ${idx + 1}</span><img src="${dataUrl}" alt="" />`;
      slot.classList.add('filled');
    }

    async function init() {
      try {
        await initAuth(CONFIG.LIFF_ID_IN);

        // check paired
        const me = await api.post('getMe', { lineUserId: state.lineUserId });
        if (!me.paired) {
          location.href = `https://liff.line.me/${CONFIG.LIFF_ID_PAIR}`;
          return;
        }

        // load materials
        const r = await api.post('listMaterials', { lineUserId: state.lineUserId });
        materials = r.materials || [];
        els.material.innerHTML = '<option value="">-- เลือกสาร --</option>' +
          materials.map(m => `<option value="${m.material_id}" data-unit="${m.unit}">${m.name} (${m.unit})</option>`).join('');
        els.material.disabled = false;

        // set min expire date = today
        const today = new Date().toISOString().slice(0, 10);
        els.expire.min = today;

      } catch (err) {
        showError(els.err, 'Error: ' + (err.message || err));
      }
    }

    els.material.addEventListener('change', () => {
      const opt = els.material.selectedOptions[0];
      const unit = opt && opt.getAttribute('data-unit') || '';
      els.unitLabel.textContent = unit ? `(${unit})` : '';
      updateSubmit();
    });

    [els.lot_no, els.qty, els.expire].forEach(el => {
      el.addEventListener('input', updateSubmit);
    });

    els.btnStart.addEventListener('click', async () => {
      try {
        clearError(els.err);
        camStream = await startCamera(els.cam, 'environment');
        els.cam.style.display = 'block';
        els.btnStart.style.display = 'none';
        els.btnCapture.style.display = 'block';
      } catch (err) {
        showError(els.err, 'เปิดกล้องไม่ได้: ' + (err.message || err));
      }
    });

    els.btnCapture.addEventListener('click', () => {
      try {
        const idx = images.findIndex(x => !x);
        if (idx === -1) return;
        const label = `รูปที่ ${idx + 1}`;
        const dataUrl = captureFromVideoWithStamp(els.cam, label);
        images[idx] = dataUrl;
        renderPhoto(idx, dataUrl);
        updateProgress();

        if (images.filter(Boolean).length >= 3) {
          // ปิดกล้อง
          stopCamera(camStream);
          camStream = null;
          els.cam.style.display = 'none';
          els.btnCapture.style.display = 'none';
          els.btnStart.style.display = 'block';
          els.btnStart.textContent = 'เปิดกล้อง (ถ่ายซ่อม)';
        }
      } catch (err) {
        showError(els.err, 'ถ่ายรูปไม่สำเร็จ: ' + (err.message || err));
      }
    });

    // เผื่อกดเปิดกล้องอีกครั้งหลังถ่ายครบ → reset images
    els.btnStart.addEventListener('click', () => {
      if (images.filter(Boolean).length >= 3) {
        images.fill(null);
        for (let i = 1; i <= 3; i++) {
          const s = document.getElementById('slot-' + i);
          s.innerHTML = `<span class="label">รูปที่ ${i}</span><span>ยังไม่ถ่าย</span>`;
          s.classList.remove('filled');
        }
        updateProgress();
        els.btnStart.textContent = 'เปิดกล้อง';
      }
    });

    els.btnSubmit.addEventListener('click', async () => {
      const taken = images.filter(Boolean).length;
      if (taken !== 3) {
        showError(els.err, 'ต้องถ่ายครบ 3 รูป');
        return;
      }

      els.btnSubmit.disabled = true;
      els.btnSubmit.textContent = 'กำลังอัปโหลด...';
      clearError(els.err);

      try {
        const r = await api.post('receiveMaterial', {
          lineUserId: state.lineUserId,
          material_id: els.material.value,
          lot_no: els.lot_no.value.trim(),
          qty: parseFloat(els.qty.value),
          supplier: els.supplier.value.trim(),
          expire_date: els.expire.value,
          note: els.note.value.trim(),
          images: images,
        });
        // success
        alert(`บันทึกสำเร็จ\nLot: ${r.lot_id}\nMovement: ${r.movement_id}`);
        if (typeof liff !== 'undefined' && liff.closeWindow) liff.closeWindow();
        else location.reload();
      } catch (err) {
        const errMsg = {
          'not_paired_staff': 'คุณยังไม่ได้รับสิทธิ์ — ติดต่อเจ้าของ',
          'material_not_found': 'ไม่พบสารที่เลือก',
          'material_inactive': 'สารนี้ถูกระงับการใช้งาน',
          'need_3_images': 'ต้องถ่ายครบ 3 รูป',
          'invalid_qty': 'จำนวนต้องมากกว่า 0',
        }[err.code] || ('เกิดข้อผิดพลาด: ' + (err.message || err));
        showError(els.err, errMsg);
        els.btnSubmit.disabled = false;
        els.btnSubmit.textContent = 'บันทึก';
      }
    });

    init();
  </script>
</body>
</html>
